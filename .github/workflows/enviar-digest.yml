name: Enviar Digest Semanal

on:
  schedule:
    # Toda segunda-feira às 11:00 UTC = 08:00 BRT
    - cron: '0 11 * * 1'
  # Permite disparar manualmente pelo GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências do sistema (necessário para xhtml2pdf)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libpangocairo-1.0-0 libffi-dev libgdk-pixbuf2.0-0 libcairo2

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Compilar e enviar digest
        env:
          GMAIL_REMETENTE: ${{ secrets.GMAIL_REMETENTE }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DESTINATARIOS: ${{ secrets.DESTINATARIOS }}
        run: python scripts/enviar_digest.py

      - name: Limpar JSONs com mais de 90 dias
        run: |
          find noticias/ -name "*.json" -mtime +90 -delete || true

      - name: Commit e push dos digests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ noticias/
          git diff --staged --quiet || git commit -m "digest: $(date +%Y-%m-%d)"
          git push
